<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glovo Rider Mini</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 18px;
}

.card {
  background: rgba(30,41,59,0.9);
  backdrop-filter: blur(10px);
  padding: 18px;
  border-radius: 22px;
  margin-bottom: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

h3 { margin-top: 0; }

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 10px;
  border-radius: 12px;
  border: none;
  background: #334155;
  color: white;
  font-size: 15px;
}

.row {
  display: flex;
  gap: 8px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
  font-size: 16px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
}

.result {
  margin-top: 15px;
  background: #020617;
  padding: 14px;
  border-radius: 14px;
  white-space: pre-line;
  font-size: 15px;
}

.copyBox {
  margin-top: 10px;
  background: #111827;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  position: relative;
}

.copyBtn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #3b82f6;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  color: white;
}

.label {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 6px;
}

</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h3>🚴 Новий день</h3>

    <input type="date" id="date">

    <div class="label">Робота</div>
    <div class="row">
      <input type="time" id="start">
      <input type="time" id="end">
    </div>

    <div class="label">Перерва</div>
    <div class="row">
      <input type="time" id="breakStart" placeholder="Початок">
      <input type="time" id="breakEnd" placeholder="Кінець">
    </div>

    <input type="number" id="earn" placeholder="Заробіток (zl)">
    <input type="number" id="cash" placeholder="Готівка (zl)">

    <button onclick="calc()">Розрахувати</button>

    <div class="result" id="result"></div>

    <div class="copyBox" id="copyBox" style="display:none;">
      <button class="copyBtn" onclick="copyText()">Копіювати</button>
      <div id="copyText"></div>
    </div>

  </div>

</div>

<script>

function formatDateLabel(dateStr) {
  let d = new Date(dateStr);
  let day = String(d.getDate()).padStart(2, '0');
  let month = String(d.getMonth() + 1).padStart(2, '0');
  let year = d.getFullYear();
  return `${day}.${month}.${year}`;
}

function toMinutes(t) {
  if (!t) return 0;
  let [h,m] = t.split(":").map(Number);
  return h*60 + m;
}

function calc() {
  let date = document.getElementById("date").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let breakStart = document.getElementById("breakStart").value;
  let breakEnd = document.getElementById("breakEnd").value;

  let earn = Number(document.getElementById("earn").value);
  let cash = Number(document.getElementById("cash").value);

  let rent = 30;
  let net = earn - rent;

  let workMinutes = toMinutes(end) - toMinutes(start);
  let breakMinutes = 0;

  if (breakStart && breakEnd) {
    breakMinutes = Math.max(0, toMinutes(breakEnd) - toMinutes(breakStart));
  }

  let realMinutes = Math.max(workMinutes - breakMinutes, 1);
  let hours = realMinutes / 60;

  let hourly = (net / hours).toFixed(2);

  // 💰 логика выплат
  let cashPaid = 0;
  let bankPaid = 0;

  if (cash > 60) {
    cashPaid = Math.min(net, cash - 60);
    bankPaid = net - cashPaid;
  } else {
    bankPaid = net;
  }

  let result =
`💰 Чистий: ${net} zl
🚲 Оренда: -30 zl
⏱ ${hourly} zl/год

💵 Готівкою: ${cashPaid} zl
🏦 Банком: ${bankPaid} zl`;

  document.getElementById("result").innerText = result;

  let copyString =
`${formatDateLabel(date)}
${start}-${end}
Перерва: ${breakStart || "-"}-${breakEnd || "-"}
💰 ${net} zl
⏱ ${hourly} zl/h
💵 ${cashPaid} zl | 🏦 ${bankPaid} zl`;

  document.getElementById("copyText").innerText = copyString;
  document.getElementById("copyBox").style.display = "block";
}

function copyText() {
  let text = document.getElementById("copyText").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
