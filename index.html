<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Generator</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #6366f1, #22d3ee);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #22d3ee;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Address → Code</h1>
    <input id="address" placeholder="Введите адрес..." />
    <button onclick="generate()">Сгенерировать</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    async function generate() {
      const address = document.getElementById("address").value;
      const res = await fetch(`/api/generate?address=${encodeURIComponent(address)}`);
      const data = await res.json();

      document.getElementById("result").innerText = data.code || data.error;
    }
  </script>
</body>
</html>
