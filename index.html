<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glovo Rider</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 12px;
  border: none;
  background: #334155;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-top: 10px;
  font-weight: bold;
}

.calc { background: #22c55e; }
.total { background: #3b82f6; }

.result {
  margin-top: 10px;
  background: #020617;
  padding: 12px;
  border-radius: 12px;
  white-space: pre-line;
}

.history {
  font-size: 14px;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

.rent {
  color: #f87171;
}

</style>
</head>

<body>

<div class="container">

  <!-- КАЛЬКУЛЯТОР -->
  <div class="card">
    <h3>🚴 Новий день</h3>

    <input type="date" id="date">
    <input type="time" id="start">
    <input type="time" id="end">
    <input type="number" id="earn" placeholder="Заробіток (zl)">
    <input type="number" id="cash" placeholder="Готівка (zl)">

    <button class="calc" onclick="calc()">Розрахувати</button>

    <div class="result" id="result"></div>
  </div>

  <!-- ПОВНИЙ ЗАРОБІТОК -->
  <div class="card">
    <button class="total" onclick="total()">💰 Повний заробіток</button>
    <div class="result" id="totalResult"></div>
  </div>

  <!-- ІСТОРІЯ -->
  <div class="card">
    <h3>📅 Історія</h3>
    <div class="history" id="history"></div>
  </div>

</div>

<script>

function formatDateLabel(dateStr) {
  let today = new Date();
  let d = new Date(dateStr);

  let diff = Math.floor((today - d) / (1000*60*60*24));

  if (diff === 0) return "Сьогодні";
  if (diff === 1) return "Вчора";
  return dateStr;
}

function calc() {
  let date = document.getElementById("date").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let earn = Number(document.getElementById("earn").value);
  let cash = Number(document.getElementById("cash").value);

  let rent = 30;
  let net = earn - rent;

  let startH = parseInt(start.split(":")[0]);
  let endH = parseInt(end.split(":")[0]);
  let hours = Math.max(endH - startH, 1);

  let hourly = (net / hours).toFixed(2);

  let cashPaid = 0;
  let cashText = "";

  if (cash > 60) {
    cashPaid = Math.min(net, cash - 60);
    cashText = "💵 Виплачено: " + cashPaid + " zl";
  } else {
    cashText = "🏦 Банк";
  }

  let result =
`💰 Чистий: ${net} zl
🚲 Оренда велосипеда: -30 zl
⏱ ${hourly} zl/год
${cashText}`;

  document.getElementById("result").innerText = result;

  // збереження
  let history = JSON.parse(localStorage.getItem("glovo_data") || "[]");

  history.unshift({
    date,
    net,
    rent,
    hourly,
    cashPaid
  });

  localStorage.setItem("glovo_data", JSON.stringify(history));

  renderHistory();
}

function total() {
  let history = JSON.parse(localStorage.getItem("glovo_data") || "[]");

  let sum = history.reduce((acc, item) => acc + item.net, 0);

  document.getElementById("totalResult").innerText =
    "💰 Загальний заробіток: " + sum + " zl";
}

function renderHistory() {
  let history = JSON.parse(localStorage.getItem("glovo_data") || "[]");

  let html = "";

  history.slice(0, 10).forEach(item => {
    html += `
<div class="item">
<b>${formatDateLabel(item.date)}</b><br>
💰 ${item.net} zl<br>
<span class="rent">🚲 -30 zl оренда</span><br>
⏱ ${item.hourly} zl/год<br>
💵 ${item.cashPaid} zl
</div>`;
  });

  document.getElementById("history").innerHTML = html;
}

renderHistory();

</script>

</body>
</html>
