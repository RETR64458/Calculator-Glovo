<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: linear-gradient(160deg, #020617, #0f172a);
  color: white;
}

.app {
  padding: 16px;
}

.title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
}

.search {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
  margin-bottom: 10px;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.tab {
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
  font-size: 12px;
}

.active {
  background: #22d3ee;
  color: black;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 8px;
}

.addr {
  font-size: 13px;
  opacity: 0.7;
}

.code {
  font-size: 18px;
  color: #22d3ee;
}

.actions {
  margin-top: 6px;
  display: flex;
  gap: 8px;
}

.btn {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
}
</style>
</head>

<body>
<div class="app">
  <div class="title">🔐 Codes</div>

  <input id="search" class="search" placeholder="Введите адрес..." />

  <div class="tabs">
    <div class="tab active" onclick="setTab('all')">Все</div>
    <div class="tab" onclick="setTab('fav')">⭐ Избранное</div>
    <div class="tab" onclick="setTab('history')">🕘 История</div>
  </div>

  <div id="list"></div>
</div>

<script>
const DATA = [
  { addr: "Mielczarskiego 17", codes: ["#1717#"] },
  { addr: "Adwentowicza 13", codes: ["1k4306"] },
  { addr: "Kilińskiego 27/29", codes: ["23k3738"] },
  { addr: "Piotrkowska 44", codes: ["#10078205#", "#10050688#"] },
  { addr: "Wschodnia 63", codes: ["#1510#", "#21050011#"] },
  { addr: "Wodna 23a", codes: ["255k9999", "1019k3097", "1012k5189"] },
  { addr: "Gdańska 22", codes: ["#1111#"] },
  { addr: "Żeligowskiego 42", codes: ["29k2601"] },
  { addr: "Uniwersytecka 29", codes: ["64k8074"] },
  { addr: "Armii Krajowej 60", codes: ["22*3312"] },
  { addr: "Kopernika 64b", codes: ["5k6951"] },
  { addr: "Jaracza 72A", codes: ["6768#"] },
  { addr: "Łąkowa 27c", codes: ["k3593k", "93kv"] }
];

let currentTab = "all";

const list = document.getElementById("list");
const input = document.getElementById("search");

let favs = JSON.parse(localStorage.getItem("favs") || "[]");
let history = JSON.parse(localStorage.getItem("history") || "[]");

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z0-9]/gi, "");
}

function render(items) {
  if (!items.length) {
    list.innerHTML = "Ничего не найдено";
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="card">
      <div class="addr">${item.addr}</div>
      ${item.codes.map(c => `<div class="code">${c}</div>`).join("")}

      <div class="actions">
        <div class="btn" onclick="copy('${item.codes[0]}')">📋</div>
        <div class="btn" onclick="toggleFav('${item.addr}')">
          ${favs.includes(item.addr) ? "★" : "☆"}
        </div>
      </div>
    </div>
  `).join("");
}

function search() {
  const val = normalize(input.value);

  let result = DATA.filter(item =>
    normalize(item.addr).includes(val)
  );

  if (val && result.length) {
    saveHistory(result[0].addr);
  }

  render(result);
}

function setTab(tab) {
  currentTab = tab;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  if (tab === "all") render(DATA);

  if (tab === "fav") {
    const items = DATA.filter(d => favs.includes(d.addr));
    render(items);
  }

  if (tab === "history") {
    const items = DATA.filter(d => history.includes(d.addr));
    render(items);
  }
}

function toggleFav(addr) {
  if (favs.includes(addr)) {
    favs = favs.filter(a => a !== addr);
  } else {
    favs.push(addr);
  }
  localStorage.setItem("favs", JSON.stringify(favs));
  setTab(currentTab);
}

function saveHistory(addr) {
  if (!history.includes(addr)) {
    history.unshift(addr);
    history = history.slice(0, 10);
    localStorage.setItem("history", JSON.stringify(history));
  }
}

function copy(text) {
  navigator.clipboard.writeText(text);
}

input.addEventListener("input", search);

// старт
render(DATA);
</script>
</body>
</html>
