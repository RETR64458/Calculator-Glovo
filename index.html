<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glovo Rider Mini</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 18px;
}

.card {
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-radius: 26px;
  margin-bottom: 15px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.7);
}

h3 {
  margin: 0 0 10px;
  font-size: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 6px 0 10px;
  border-radius: 16px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 15px;
}

.row {
  display: flex;
  gap: 8px;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 18px;
  border: none;
  margin-top: 12px;
  font-weight: bold;
  font-size: 16px;
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: #022c22;
  transition: 0.2s;
}

button:active {
  transform: scale(0.96);
}

.result {
  margin-top: 16px;
  background: #020617;
  padding: 16px;
  border-radius: 18px;
  font-size: 15px;
}

.resultLine {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #1e293b;
}

.resultLine:last-child {
  border-bottom: none;
}

.green { color: #4ade80; }
.blue { color: #60a5fa; }
.red { color: #f87171; }

.copyBox {
  margin-top: 14px;
  background: #020617;
  padding: 14px;
  border-radius: 18px;
  font-size: 13px;
  border: 1px solid #1e293b;
}

.copyBtn {
  margin-top: 10px;
  width: 100%;
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  border: none;
  padding: 10px;
  border-radius: 12px;
  font-size: 14px;
  color: white;
}

.success {
  margin-top: 6px;
  font-size: 12px;
  color: #4ade80;
  display: none;
}

.label {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 8px;
}

</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h3>🚴 Робочий день</h3>

    <input type="date" id="date">

    <div class="label">Робочий час</div>
    <div class="row">
      <input type="time" id="start">
      <input type="time" id="end">
    </div>

    <div class="label">Перерва</div>
    <div class="row">
      <input type="time" id="breakStart">
      <input type="time" id="breakEnd">
    </div>

    <input type="number" id="earn" placeholder="Заробіток (zl)">
    <input type="number" id="cash" placeholder="Готівка (zl)">

    <button onclick="calc()">Розрахувати</button>

    <div class="result" id="result"></div>

    <div class="copyBox" id="copyBox" style="display:none;">
      <div id="copyText"></div>
      <button class="copyBtn" onclick="copyText()">Скопіювати</button>
      <div class="success" id="copySuccess">✔ Скопійовано</div>
    </div>

  </div>

</div>

<script>

function formatDateLabel(dateStr) {
  let d = new Date(dateStr);
  let day = String(d.getDate()).padStart(2, '0');
  let month = String(d.getMonth() + 1).padStart(2, '0');
  let year = d.getFullYear();
  return `${day}.${month}.${year}`;
}

function toMinutes(t) {
  if (!t) return 0;
  let [h,m] = t.split(":").map(Number);
  return h*60 + m;
}

function calc() {
  let date = document.getElementById("date").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let breakStart = document.getElementById("breakStart").value;
  let breakEnd = document.getElementById("breakEnd").value;

  let earn = Number(document.getElementById("earn").value);
  let cash = Number(document.getElementById("cash").value);

  let rent = 30;
  let net = earn - rent;

  let workMinutes = toMinutes(end) - toMinutes(start);
  let breakMinutes = (breakStart && breakEnd)
    ? Math.max(0, toMinutes(breakEnd) - toMinutes(breakStart))
    : 0;

  let realMinutes = Math.max(workMinutes - breakMinutes, 1);
  let hours = realMinutes / 60;

  let hourly = (net / hours).toFixed(2);

  let cashPaid = 0;
  let bankPaid = 0;

  if (cash > 60) {
    cashPaid = Math.min(net, cash - 60);
    bankPaid = net - cashPaid;
  } else {
    bankPaid = net;
  }

  let breakText = (breakStart && breakEnd)
    ? `${breakStart}-${breakEnd}`
    : "Без перерыва";

  document.getElementById("result").innerHTML = `
    <div class="resultLine"><span>💰 Чистий</span><span class="green">${net} zl</span></div>
    <div class="resultLine"><span>🚲 Оренда</span><span class="red">-30 zl</span></div>
    <div class="resultLine"><span>⏱ За годину</span><span>${hourly} zl</span></div>
    <div class="resultLine"><span>💵 Готівка</span><span class="green">${cashPaid} zl</span></div>
    <div class="resultLine"><span>🏦 Банк</span><span class="blue">${bankPaid} zl</span></div>
  `;

  let copyString =
`${formatDateLabel(date)} | ${start}-${end} | ${breakText} | ${net} zl | ${cashPaid} zl | ${bankPaid} zl`;

  document.getElementById("copyText").innerText = copyString;
  document.getElementById("copyBox").style.display = "block";
}

function copyText() {
  let text = document.getElementById("copyText").innerText;

  navigator.clipboard.writeText(text).then(() => {
    let el = document.getElementById("copySuccess");
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 1500);
  });
}

</script>

</body>
</html>
