<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glovo Rider</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  opacity: 0.7;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 12px;
  border: none;
  background: #334155;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
  font-weight: bold;
  margin-top: 10px;
}

.result {
  margin-top: 15px;
  background: #020617;
  padding: 15px;
  border-radius: 15px;
  white-space: pre-line;
}

.cash {
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  background: #14532d;
}

</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>🚴 Glovo Rider</h2>

    <label>Дата</label>
    <input type="date" id="date">

    <label>Початок</label>
    <input type="time" id="start">

    <label>Кінець</label>
    <input type="time" id="end">

    <label>Заробіток (zl)</label>
    <input type="number" id="earn">

    <label>Готівка (zl)</label>
    <input type="number" id="cash">

    <button onclick="calc()">Розрахувати</button>

    <div class="result" id="result"></div>
    <div class="cash" id="cashInfo"></div>
  </div>
</div>

<script>

function calc() {
  let date = document.getElementById("date").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let earn = Number(document.getElementById("earn").value);
  let cash = Number(document.getElementById("cash").value);

  let rent = 30;
  let net = earn - rent;

  let startH = parseInt(start.split(":")[0]);
  let endH = parseInt(end.split(":")[0]);
  let hours = Math.max(endH - startH, 1);

  let hourly = (net / hours).toFixed(2);

  let result = "";
  let cashPaid = 0;

  if (cash > 60) {
    cashPaid = Math.min(net, cash - 60);
    let left = cash - cashPaid;

    result =
`📅 ${date}
⏰ ${start} - ${end}
💰 ${net} zl (-30)
⏱ ${hourly} zl/год
💵 Залишок: ${left} zl`;

  } else {
    result =
`📅 ${date}
⏰ ${start} - ${end}
💰 ${net} zl (-30)
⏱ ${hourly} zl/год
🏦 Виплата на банк`;
  }

  document.getElementById("result").innerText = result;

  document.getElementById("cashInfo").innerText =
    cashPaid > 0
      ? "💵 Виплачено готівкою: " + cashPaid + " zl"
      : "";

}

</script>

</body>
</html>
